<svg width="256" height="256" viewBox="-20 -20 296 296" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Glow / Drop Shadow effect simulated via a soft circle backing -->
  <circle cx="128" cy="128" r="120" fill="#000000" opacity="0.15" filter="url(#glow)"/>

  <!-- Main Circular Base -->
  <circle cx="128" cy="128" r="115" fill="url(#main_grad)" stroke="url(#border_grad)" stroke-width="8"/>
  
  <!-- Outer Ring Detail -->
  <circle cx="128" cy="128" r="95" fill="none" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="2" stroke-dasharray="10 5"/>
  
  <!-- "Ru" Text with highly detailed gradient and shadow -->
  <text x="128" y="128" font-family="'Segoe UI', 'SF Pro Display', Roboto, sans-serif" font-weight="900" font-size="120" fill="url(#text_grad)" text-anchor="middle" dominant-baseline="central" letter-spacing="-3" filter="url(#text_shadow)">Ru</text>
  
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="main_grad" x1="20" y1="20" x2="236" y2="236" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F2027"/>
      <stop offset="50%" stop-color="#203A43"/>
      <stop offset="100%" stop-color="#2C5364"/>
    </linearGradient>
    
    <!-- Stroke Gradient to give a metallic/3D edge -->
    <linearGradient id="border_grad" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0055FF" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Text Gradient -->
    <linearGradient id="text_grad" x1="80" y1="50" x2="180" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#AEEEEE"/>
    </linearGradient>
    
    <!-- Text Shadow Filter -->
    <filter id="text_shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <!-- Outer Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
</svg>
